name: Claude Conflict Resolver

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  find-conflicts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      conflicting_prs: ${{ steps.find.outputs.conflicting_prs }}
      has_conflicts: ${{ steps.find.outputs.has_conflicts }}
    steps:
      - name: Find conflicting PRs
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Poll with backoff until GitHub recalculates mergeability
          CONFLICTING=""
          for attempt in 1 2 3 4 5 6; do
            echo "Attempt $attempt: checking mergeability..."
            sleep $(( attempt * 10 ))

            ALL_PRS=$(gh pr list --base main --state open --json number,mergeable --repo "$GITHUB_REPOSITORY" 2>/dev/null || echo "[]")
            UNKNOWN_COUNT=$(echo "$ALL_PRS" | jq '[.[] | select(.mergeable == "UNKNOWN")] | length')
            CONFLICT_COUNT=$(echo "$ALL_PRS" | jq '[.[] | select(.mergeable == "CONFLICTING")] | length')

            echo "  UNKNOWN: $UNKNOWN_COUNT, CONFLICTING: $CONFLICT_COUNT"

            if [ "$UNKNOWN_COUNT" -eq 0 ]; then
              CONFLICTING=$(echo "$ALL_PRS" | jq -c '[.[] | select(.mergeable == "CONFLICTING") | .number]')
              break
            fi

            if [ "$attempt" -eq 6 ]; then
              CONFLICTING=$(echo "$ALL_PRS" | jq -c '[.[] | select(.mergeable == "CONFLICTING") | .number]')
            fi
          done

          if [ "$CONFLICTING" = "[]" ] || [ -z "$CONFLICTING" ]; then
            echo "No conflicting PRs found"
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            echo "conflicting_prs=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Conflicting PRs: $CONFLICTING"
          echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
          echo "conflicting_prs=$CONFLICTING" >> "$GITHUB_OUTPUT"

  resolve:
    needs: find-conflicts
    if: needs.find-conflicts.outputs.has_conflicts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    strategy:
      matrix:
        pr_number: ${{ fromJson(needs.find-conflicts.outputs.conflicting_prs) }}
      max-parallel: 3
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR branch
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(gh pr view ${{ matrix.pr_number }} --json headRefName --jq '.headRefName' --repo "$GITHUB_REPOSITORY")
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Resolving PR #${{ matrix.pr_number }} on branch $BRANCH"

      - name: Resolve conflicts with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          direct_prompt: |
            PR #${{ matrix.pr_number }} on branch `${{ steps.pr-info.outputs.branch }}` has merge conflicts with main. Resolve them:

            1. `git fetch origin && git checkout ${{ steps.pr-info.outputs.branch }}`
            2. `git merge origin/main`
            3. Resolve conflicts: keep both sides' changes where possible. For true conflicts, preserve the PR branch's intent while incorporating main's updates.
            4. `git add -A && git commit -m "merge: resolve conflicts with main" && git push origin ${{ steps.pr-info.outputs.branch }}`

            If conflicts are too complex, explain what needs manual resolution.
