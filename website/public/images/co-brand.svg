<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 36" fill="none">
  <!-- Bushido kanji 武士道 + collective name -->
  <text x="0" y="24" font-family="'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif" font-size="20" font-weight="500" fill="#78716c">武士道</text>
  <text x="54" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#78716c" letter-spacing="0.8">THE BUSHIDO</text>
  <text x="54" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#78716c" letter-spacing="0.8">COLLECTIVE</text>
  <!-- Divider -->
  <line x1="148" y1="6" x2="148" y2="30" stroke="#d6d3d1" stroke-width="1"/>
  <!-- GigSmart wordmark neutral -->
  <text x="160" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#78716c" letter-spacing="-0.3">GIGSMART</text>
  <text x="160" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="400" fill="#a8a29e">founding contributor</text>
</svg>
