<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA routing — redirect unknown paths to /browse/ if they
    // match the browse pattern, preserving the full path in sessionStorage.
    // The browse page reads this back on load and renders accordingly.
    (function () {
      var pathname = window.location.pathname;
      var search = window.location.search;
      if (pathname.indexOf('/browse/') === 0 && pathname.length > '/browse/'.length) {
        sessionStorage.setItem('browse-redirect-path', pathname + search);
        window.location.replace('/browse/');
      } else {
        // Not a browse path — show simple 404
        document.title = 'Page Not Found';
        document.body.innerHTML = '<div style="text-align:center;padding:4rem;font-family:system-ui,sans-serif">' +
          '<h1 style="font-size:2rem;font-weight:bold;margin-bottom:1rem">Page Not Found</h1>' +
          '<p style="color:#666">The page you are looking for does not exist.</p>' +
          '<a href="/" style="color:#0d9488;margin-top:1rem;display:inline-block">Go home</a>' +
          '</div>';
      }
    })();
  </script>
</head>
<body></body>
</html>
