<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H&#183;AI&#183;K&#183;U in Action &mdash; A Simulated Session</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0c0a09;--bg-panel:#1c1917;--bg-panel-alt:#292524;
    --text:#e7e5e4;--text-dim:#a8a29e;--text-muted:#78716c;
    --accent:#2dd4bf;--accent-dim:#0d9488;--accent-glow:rgba(45,212,191,.15);
    --user:#818cf8;--agent:#2dd4bf;--system:#fbbf24;
    --green:#22c55e;--red:#ef4444;--orange:#f59e0b;
    --border:#44403c;--border-dim:#292524;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Inter",ui-sans-serif,system-ui,sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

  /* Layout */
  .app{display:flex;flex-direction:column;height:100vh}
  .top-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;border-bottom:1px solid var(--border-dim);
    background:var(--bg);z-index:10;flex-shrink:0;
  }
  .top-bar h1{font-size:16px;font-weight:600;letter-spacing:.5px;color:var(--accent)}
  .top-bar h1 span{color:var(--text-dim);font-weight:400}
  .controls{display:flex;align-items:center;gap:12px}
  .controls button{
    background:var(--bg-panel);border:1px solid var(--border);color:var(--text);
    padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--sans);
    transition:all .15s;
  }
  .controls button:hover{border-color:var(--accent);color:var(--accent)}
  .controls button.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .speed-btns{display:flex;gap:4px}
  .speed-btns button{padding:4px 10px;font-size:12px;border-radius:4px}
  .progress-wrap{
    flex-shrink:0;height:3px;background:var(--bg-panel-alt);position:relative;
  }
  .progress-bar{
    height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));
    width:0;transition:width .3s ease;
  }
  .main{display:flex;flex:1;overflow:hidden}

  /* Terminal */
  .terminal-panel{
    flex:0 0 60%;display:flex;flex-direction:column;border-right:1px solid var(--border-dim);
    background:var(--bg);
  }
  .terminal-header{
    padding:10px 16px;font-size:12px;color:var(--text-muted);
    border-bottom:1px solid var(--border-dim);
    display:flex;align-items:center;gap:8px;flex-shrink:0;
  }
  .terminal-header .dots{display:flex;gap:6px}
  .terminal-header .dot{width:10px;height:10px;border-radius:50%}
  .dot-r{background:#ef4444}.dot-y{background:#fbbf24}.dot-g{background:#22c55e}
  .terminal-body{
    flex:1;overflow-y:auto;padding:16px 20px;font-family:var(--mono);font-size:13px;
    line-height:1.7;scroll-behavior:smooth;
  }
  .terminal-body::-webkit-scrollbar{width:6px}
  .terminal-body::-webkit-scrollbar-track{background:transparent}
  .terminal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .msg{margin-bottom:12px;animation:fadeSlideIn .3s ease}
  .msg-user .msg-label{color:var(--user);font-weight:600}
  .msg-agent .msg-label{color:var(--agent);font-weight:600}
  .msg-system .msg-label{color:var(--system);font-weight:600}
  .msg-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
  .msg-text{color:var(--text);white-space:pre-wrap}
  .msg-system .msg-text{color:var(--system);font-style:italic}

  .typing-indicator{display:inline-flex;gap:4px;padding:4px 0}
  .typing-indicator span{
    width:6px;height:6px;border-radius:50%;background:var(--accent);
    animation:typingDot .8s infinite;
  }
  .typing-indicator span:nth-child(2){animation-delay:.15s}
  .typing-indicator span:nth-child(3){animation-delay:.3s}

  .ff-indicator{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 12px;background:var(--bg-panel-alt);border-radius:6px;
    color:var(--system);font-size:12px;margin:8px 0;
    animation:pulse 1.5s ease-in-out infinite;
  }
  .ff-indicator svg{width:14px;height:14px}

  /* Right panels */
  .right-panels{flex:0 0 40%;display:flex;flex-direction:column;overflow:hidden}

  /* Artifact panel */
  .artifact-panel{
    flex:1;border-bottom:1px solid var(--border-dim);display:flex;flex-direction:column;
    background:var(--bg-panel);overflow:hidden;
  }
  .panel-header{
    padding:10px 16px;font-size:12px;font-weight:600;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border-dim);
    flex-shrink:0;
  }
  .file-tree{
    flex:1;overflow-y:auto;padding:12px 16px;font-family:var(--mono);font-size:12px;
    line-height:1.8;
  }
  .file-tree::-webkit-scrollbar{width:6px}
  .file-tree::-webkit-scrollbar-track{background:transparent}
  .file-tree::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .tree-item{color:var(--text-dim);white-space:nowrap;animation:fadeSlideIn .3s ease}
  .tree-item.highlight{color:var(--accent);text-shadow:0 0 8px var(--accent-glow)}
  .tree-item.folder{color:var(--text-muted)}
  .tree-item .icon{margin-right:6px;display:inline-block;width:16px;text-align:center}

  /* Board panel */
  .board-panel{
    flex:0 0 auto;min-height:200px;max-height:260px;display:flex;flex-direction:column;
    background:var(--bg-panel);overflow:hidden;
  }
  .board-scroll{
    flex:1;overflow-x:auto;overflow-y:hidden;padding:12px 16px;display:flex;gap:10px;
  }
  .board-scroll::-webkit-scrollbar{height:6px}
  .board-scroll::-webkit-scrollbar-track{background:transparent}
  .board-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .board-col{
    flex:0 0 130px;display:flex;flex-direction:column;gap:6px;
    transition:opacity .3s;
  }
  .board-col.dimmed{opacity:.35}
  .board-col.active .col-header{color:var(--accent);border-color:var(--accent)}
  .board-col.completed .col-header{color:var(--green);border-color:var(--green)}
  .col-header{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
    color:var(--text-muted);padding-bottom:6px;border-bottom:2px solid var(--border);
    transition:all .3s;
  }
  .col-cards{display:flex;flex-direction:column;gap:4px;min-height:30px}
  .card{
    padding:6px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);
    background:var(--bg-panel-alt);border:1px solid var(--border);
    color:var(--text-dim);animation:fadeSlideIn .3s ease;transition:all .3s;
  }
  .card.in-progress{border-color:var(--accent);color:var(--accent);background:rgba(45,212,191,.08)}
  .card.completed{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08)}

  /* Animations */
  @keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes typingDot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  @keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
  @keyframes highlightFade{0%{color:var(--accent);text-shadow:0 0 12px var(--accent-glow)}100%{color:var(--text-dim);text-shadow:none}}

  /* Mobile tab bar */
  .mobile-tabs{
    display:none;flex-shrink:0;
    border-bottom:1px solid var(--border-dim);background:var(--bg);
  }
  .mobile-tabs button{
    flex:1;padding:8px 0;font-size:12px;font-weight:600;font-family:var(--sans);
    background:none;border:none;border-bottom:2px solid transparent;
    color:var(--text-muted);cursor:pointer;transition:all .15s;
  }
  .mobile-tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* Responsive */
  @media(max-width:900px){
    .main{flex-direction:column}
    .terminal-panel{flex:1;border-right:none;border-bottom:1px solid var(--border-dim)}
    .right-panels{flex:1}
    .board-col{flex:0 0 110px}
    .top-bar{padding:10px 12px}
    .speed-btns{display:none}
    .kbd-hint{display:none}
  }
  @media(max-width:600px){
    .mobile-tabs{display:flex}
    .main{flex-direction:column;overflow:hidden}
    .terminal-panel{flex:1;border-right:none;border-bottom:none}
    .terminal-body{-webkit-overflow-scrolling:touch;padding:12px 14px;font-size:12px;line-height:1.6}
    .right-panels{flex:1}
    .terminal-panel.mobile-hidden,.right-panels.mobile-hidden{display:none !important}
    .top-bar h1{font-size:13px}
    .top-bar h1 span{display:none}
    .controls button{padding:4px 8px;font-size:11px}
    .controls{gap:6px}
    .file-tree{font-size:11px;line-height:1.6;-webkit-overflow-scrolling:touch}
    .board-col{flex:0 0 100px}
    .board-scroll{-webkit-overflow-scrolling:touch}
    .card{font-size:10px;padding:4px 6px}
    .col-header{font-size:9px}
    .panel-header{font-size:11px;padding:8px 12px}
    .completion-card{padding:30px 24px}
    .completion-card h2{font-size:20px}
  }

  /* Completed overlay */
  .completion-overlay{
    position:fixed;inset:0;background:rgba(12,10,9,.85);
    display:flex;align-items:center;justify-content:center;
    z-index:100;opacity:0;pointer-events:none;transition:opacity .5s;
  }
  .completion-overlay.visible{opacity:1;pointer-events:auto}
  .completion-card{
    text-align:center;padding:40px 60px;background:var(--bg-panel);
    border:1px solid var(--accent);border-radius:16px;
    box-shadow:0 0 60px rgba(45,212,191,.15);
    animation:fadeSlideIn .5s ease;
  }
  .completion-card h2{color:var(--accent);font-size:24px;margin-bottom:8px}
  .completion-card p{color:var(--text-dim);font-size:14px;margin-bottom:20px}
  .completion-card button{
    background:var(--accent);color:var(--bg);border:none;
    padding:10px 28px;border-radius:8px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:var(--sans);
  }
  .completion-card button:hover{opacity:.85}

  /* Step counter */
  .step-counter{
    font-size:12px;color:var(--text-muted);font-family:var(--mono);
    letter-spacing:.5px;
  }
  .step-counter .current-stage{
    color:var(--accent);font-weight:600;margin-left:8px;
  }

  /* Terminal stage badge */
  .stage-badge{
    display:inline-flex;align-items:center;gap:5px;
    padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;
    background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-dim);
    margin-left:auto;transition:all .3s;
  }
  .stage-badge.idle{color:var(--text-muted);background:transparent;border-color:var(--border)}

  /* Cursor blink for typing effect */
  .cursor{
    display:inline-block;width:7px;height:14px;background:var(--user);
    animation:cursorBlink .6s step-end infinite;vertical-align:text-bottom;margin-left:1px;
  }
  @keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

  /* Keyboard hint */
  .kbd-hint{
    position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
    font-size:11px;color:var(--text-muted);font-family:var(--mono);
    opacity:.5;z-index:5;pointer-events:none;
  }
  .kbd-hint kbd{
    display:inline-block;padding:1px 6px;border:1px solid var(--border);
    border-radius:3px;background:var(--bg-panel-alt);font-size:10px;
    margin:0 2px;
  }

  /* Glow effect on stage transition */
  .stage-flash{
    animation:stageFlash .6s ease;
  }
  @keyframes stageFlash{
    0%{box-shadow:0 0 0 0 rgba(45,212,191,.4)}
    50%{box-shadow:0 0 20px 4px rgba(45,212,191,.2)}
    100%{box-shadow:0 0 0 0 transparent}
  }

  /* Visual review overlay */
  .review-overlay{
    position:fixed;inset:0;background:rgba(12,10,9,.92);
    display:flex;align-items:center;justify-content:center;
    z-index:90;opacity:0;pointer-events:none;transition:opacity .4s;
  }
  .review-overlay.visible{opacity:1;pointer-events:auto}
  .review-card{
    width:480px;max-width:90vw;background:var(--bg-panel);
    border:1px solid var(--accent-dim);border-radius:16px;
    box-shadow:0 0 60px rgba(45,212,191,.12);
    animation:fadeSlideIn .4s ease;overflow:hidden;
  }
  .review-card-header{
    padding:16px 24px;border-bottom:1px solid var(--border-dim);
    display:flex;align-items:center;justify-content:space-between;
  }
  .review-card-header h3{font-size:16px;font-weight:700;color:var(--accent)}
  .review-card-header .review-tag{
    font-size:11px;padding:3px 10px;border-radius:10px;
    background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-dim);
  }
  .review-card-body{padding:20px 24px}
  .review-card-body h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}

  /* Wireframe sketch */
  .wireframe{
    background:var(--bg-panel-alt);border:1px solid var(--border);border-radius:8px;
    padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;
    margin-bottom:16px;
  }
  .wire-box{
    border:1px dashed var(--border);border-radius:6px;padding:8px 16px;
    font-size:11px;font-family:var(--mono);color:var(--text-muted);text-align:center;
    width:100%;max-width:220px;
  }
  .wire-box.logo{
    border-style:solid;border-color:var(--accent-dim);color:var(--accent);
    font-weight:600;font-size:13px;padding:14px;
  }
  .wire-box.btn{
    background:rgba(45,212,191,.08);border-color:var(--accent-dim);color:var(--accent);
  }
  .wire-box.link{font-size:10px;border:none;color:var(--text-muted);text-decoration:underline}
  .wire-row{display:flex;gap:8px;width:100%;max-width:220px}
  .wire-row .wire-box{flex:1}

  /* Criteria checklist */
  .review-criteria{list-style:none;padding:0;margin:0 0 16px 0}
  .review-criteria li{
    font-size:12px;font-family:var(--mono);color:var(--text-dim);
    padding:4px 0;display:flex;align-items:center;gap:8px;
  }
  .review-criteria li .check{
    width:14px;height:14px;border:1px solid var(--border);border-radius:3px;
    display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
    font-size:10px;color:var(--green);transition:all .3s;
  }
  .review-criteria li.checked .check{border-color:var(--green);background:rgba(34,197,94,.15)}

  /* Review action buttons */
  .review-actions{
    display:flex;gap:12px;padding:16px 24px;border-top:1px solid var(--border-dim);
  }
  .review-btn{
    flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;
    font-weight:600;font-family:var(--sans);cursor:default;transition:all .3s;
  }
  .review-btn.approve{background:var(--green);color:var(--bg)}
  .review-btn.reject{background:var(--bg-panel-alt);color:var(--text-dim);border:1px solid var(--border)}
  .review-btn.approve.highlight{box-shadow:0 0 16px rgba(34,197,94,.4);transform:scale(1.03)}
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <div class="top-bar">
    <h1>H&#183;AI&#183;K&#183;U <span>in Action</span></h1>
    <div class="controls">
      <span class="step-counter" id="step-counter"></span>
      <button id="btn-play" class="active" title="Play / Pause (Space)">&#9654; Play</button>
      <div class="speed-btns">
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="2">2x</button>
        <button class="speed-btn" data-speed="4">4x</button>
      </div>
      <button id="btn-restart" title="Restart (R)">&#8634; Restart</button>
    </div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>

  <!-- Mobile tab bar -->
  <div class="mobile-tabs" id="mobile-tabs">
    <button class="active" data-tab="terminal">Terminal</button>
    <button data-tab="artifacts">Artifacts</button>
    <button data-tab="board">Board</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="terminal-panel" id="terminal-panel">
      <div class="terminal-header">
        <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
        <span>claude &mdash; ~/my-app</span>
        <span class="stage-badge idle" id="stage-badge">ready</span>
      </div>
      <div class="terminal-body" id="terminal"></div>
    </div>
    <div class="right-panels" id="right-panels">
      <div class="artifact-panel" id="artifact-panel">
        <div class="panel-header">Artifacts</div>
        <div class="file-tree" id="file-tree"></div>
      </div>
      <div class="board-panel" id="board-panel">
        <div class="panel-header">Lifecycle Board</div>
        <div class="board-scroll" id="board"></div>
      </div>
    </div>
  </div>
</div>

<!-- Visual review overlay -->
<div class="review-overlay" id="review-overlay">
  <div class="review-card" id="review-card"></div>
</div>

<!-- Completion overlay -->
<div class="completion-overlay" id="completion-overlay">
  <div class="completion-card">
    <h2>Intent Complete</h2>
    <p id="completion-text">All 6 stages passed. add-oauth-login delivered.</p>
    <button id="btn-replay">Replay Demo</button>
  </div>
</div>

<!-- Keyboard hint -->
<div class="kbd-hint">
  <kbd>Space</kbd> play/pause &nbsp; <kbd>R</kbd> restart &nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>4</kbd> speed
</div>

<script>
// ── DOM refs (globals for studio config scripts) ──
var termEl     = document.getElementById("terminal");
var treeEl     = document.getElementById("file-tree");
var boardEl    = document.getElementById("board");
var progressEl = document.getElementById("progress-bar");
var playBtn    = document.getElementById("btn-play");
var restartBtn = document.getElementById("btn-restart");
var replayBtn  = document.getElementById("btn-replay");
var overlay    = document.getElementById("completion-overlay");
var reviewOverlay = document.getElementById("review-overlay");
var reviewCard    = document.getElementById("review-card");
var speedBtns  = document.querySelectorAll(".speed-btn");
var stepCounterEl = document.getElementById("step-counter");
var stageBadgeEl  = document.getElementById("stage-badge");
var completionTextEl = document.getElementById("completion-text");

// ── State ──
var playing  = true;
var speed    = 1;
var stepIdx  = 0;
var timer    = null;
var files    = [];
var columns  = {};
var currentStage = null;

// ── Stages (overridden by config if present) ──
var STAGES = ["inception","design","product","development","operations","security"];

// ── Helpers ──
function scrollTerminal(){ termEl.scrollTop = termEl.scrollHeight; }

function addMsg(type, label, text){
  const div = document.createElement("div");
  div.className = "msg msg-" + type;
  div.innerHTML = '<div class="msg-label">' + label + '</div><div class="msg-text">' + escHtml(text) + '</div>';
  termEl.appendChild(div);
  scrollTerminal();
}

function addTyping(){
  const div = document.createElement("div");
  div.className = "msg msg-agent";
  div.id = "typing-msg";
  div.innerHTML = '<div class="msg-label">agent</div><div class="typing-indicator"><span></span><span></span><span></span></div>';
  termEl.appendChild(div);
  scrollTerminal();
}
function removeTyping(){
  const el = document.getElementById("typing-msg");
  if(el) el.remove();
}

function addFastForward(seconds){
  const div = document.createElement("div");
  div.className = "ff-indicator";
  div.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 19 22 12 13 5"/><polygon points="2 19 11 12 2 5"/></svg> Fast-forwarding ' + seconds + 's of deep work...';
  div.id = "ff-indicator";
  termEl.appendChild(div);
  scrollTerminal();
}
function removeFastForward(){
  const el = document.getElementById("ff-indicator");
  if(el) el.remove();
}

function escHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Visual review overlay ──
function showDesignReview(stageName, intentTitle){
  reviewCard.innerHTML =
    '<div class="review-card-header">' +
      '<h3>' + escHtml(stageName) + ' Review</h3>' +
      '<span class="review-tag">ask gate</span>' +
    '</div>' +
    '<div class="review-card-body">' +
      '<h4>' + escHtml(intentTitle) + '</h4>' +
      '<div class="wireframe">' +
        '<div class="wire-box logo">Logo</div>' +
        '<div class="wire-box btn">Sign in with Google</div>' +
        '<div class="wire-box btn">Sign in with GitHub</div>' +
        '<div class="wire-box link">Forgot password?</div>' +
      '</div>' +
    '</div>' +
    '<div class="review-actions">' +
      '<button class="review-btn reject">Request Changes</button>' +
      '<button class="review-btn approve" id="review-approve-btn">Approve Stage</button>' +
    '</div>';
  reviewOverlay.classList.add("visible");
}

function showCriteriaReview(stageName, intentTitle, criteria, gateType){
  var tag = gateType || "external gate";
  // Normalize: if gateType doesn't already end with "gate", append it
  if(tag.indexOf("gate") === -1) tag = tag + " gate";
  var items = criteria.map(function(c){
    return '<li><span class="check"></span>' + escHtml(c) + '</li>';
  }).join("");
  reviewCard.innerHTML =
    '<div class="review-card-header">' +
      '<h3>' + escHtml(stageName) + ' Review</h3>' +
      '<span class="review-tag">' + escHtml(tag) + '</span>' +
    '</div>' +
    '<div class="review-card-body">' +
      '<h4>' + escHtml(intentTitle) + '</h4>' +

// ── File tree ──
function addFile(path){
  if(files.includes(path)) return;
  files.push(path);
  renderTree();
  // highlight newest
  setTimeout(function(){
    const items = treeEl.querySelectorAll(".tree-item");
    items.forEach(function(it){ it.classList.remove("highlight"); });
    const last = treeEl.querySelector('[data-path="' + path + '"]');
    if(last) last.classList.add("highlight");
    // remove highlight after 2s
    setTimeout(function(){ if(last) last.classList.remove("highlight"); }, 2000);
  }, 50);
}

function renderTree(){
  // Build a nested structure
  const root = {};
  files.forEach(function(p){
    const parts = p.split("/");
    let node = root;
    parts.forEach(function(seg, i){
      if(!node[seg]) node[seg] = (i === parts.length - 1) ? null : {};
      if(node[seg] !== null) node = node[seg];
    });
  });
  treeEl.innerHTML = "";
  renderNode(root, 0, "");
}

function renderNode(node, depth, parentPath){
  const keys = Object.keys(node).sort(function(a,b){
    const aDir = node[a] !== null;
    const bDir = node[b] !== null;
    if(aDir && !bDir) return -1;
    if(!aDir && bDir) return 1;
    return a.localeCompare(b);
  });
  keys.forEach(function(key){
    const fullPath = parentPath ? parentPath + "/" + key : key;
    const isDir = node[key] !== null;
    const div = document.createElement("div");
    div.className = "tree-item" + (isDir ? " folder" : "");
    div.setAttribute("data-path", fullPath);
    div.style.paddingLeft = (depth * 16 + 4) + "px";
    div.innerHTML = '<span class="icon">' + (isDir ? "\uD83D\uDCC1" : "\uD83D\uDCC4") + '</span>' + key;
    treeEl.appendChild(div);
    if(isDir) renderNode(node[key], depth + 1, fullPath);
  });
}

// ── Board ──
function initBoard(){
  boardEl.innerHTML = "";
  columns = {};
  STAGES.forEach(function(stage){
    const col = document.createElement("div");
    col.className = "board-col dimmed";
    col.innerHTML = '<div class="col-header">' + stage + '</div><div class="col-cards"></div>';
    boardEl.appendChild(col);
    columns[stage] = { el: col, cards: {} };
  });
}

function activateStage(stage){
  currentStage = stage;
  STAGES.forEach(function(s){
    const c = columns[s];
    c.el.classList.remove("active","stage-flash");
    if(STAGES.indexOf(s) < STAGES.indexOf(stage)){
      c.el.classList.remove("dimmed");
      c.el.classList.add("completed");
    } else if(s === stage){
      c.el.classList.remove("dimmed");
      c.el.classList.add("active");
      // Flash animation
      void c.el.offsetWidth;
      c.el.classList.add("stage-flash");
    } else {
      c.el.classList.add("dimmed");
    }
  });
  // Update stage badge
  stageBadgeEl.textContent = stage;
  stageBadgeEl.classList.remove("idle");
}

function addCard(stage, name, status){
  const cardsEl = columns[stage].el.querySelector(".col-cards");
  const card = document.createElement("div");
  card.className = "card" + (status ? " " + status : "");
  card.textContent = name;
  cardsEl.appendChild(card);
  columns[stage].cards[name] = card;
}

function updateCard(stage, name, status){
  const card = columns[stage].cards[name];
  if(card){
    card.className = "card " + status;
  }
}

function completeAllStages(){
  currentStage = "complete";
  STAGES.forEach(function(s){
    var c = columns[s];
    c.el.classList.remove("dimmed","active");
    c.el.classList.add("completed");
    Object.keys(c.cards).forEach(function(n){
      c.cards[n].className = "card completed";
    });
  });
  stageBadgeEl.textContent = "complete";
  stageBadgeEl.style.color = "var(--green)";
  stageBadgeEl.style.borderColor = "var(--green)";
  stageBadgeEl.style.background = "rgba(34,197,94,.1)";
}

// ── Engine ──
function getTotalSteps(){ return steps.length; }

function updateProgress(){
  var pct = Math.min(100, (stepIdx / getTotalSteps()) * 100);
  progressEl.style.width = pct + "%";
}

function updateStepCounter(){
  var stageText = currentStage ? '<span class="current-stage">' + currentStage + '</span>' : '';
  stepCounterEl.innerHTML = stepIdx + '/' + getTotalSteps() + stageText;
}

function runStep(){
  if(!playing || stepIdx >= steps.length) return;
  var step = steps[stepIdx];
  step.actions.forEach(function(fn){ fn(); });
  stepIdx++;
  updateProgress();
  updateStepCounter();

  if(stepIdx < steps.length){
    var nextDelay = steps[stepIdx].delay / speed;
    timer = setTimeout(runStep, nextDelay);
  } else {
    updateProgress();
  }
}

function start(){
  if(stepIdx < steps.length){
    var nextDelay = steps[stepIdx].delay / speed;
    timer = setTimeout(runStep, nextDelay);
  }
}

function pause(){
  clearTimeout(timer);
  timer = null;
}

function reset(){
  pause();
  stepIdx = 0;
  playing = true;
  currentStage = null;
  termEl.innerHTML = "";
  treeEl.innerHTML = "";
  files = [];
  overlay.classList.remove("visible");
  reviewOverlay.classList.remove("visible");
  stageBadgeEl.textContent = "ready";
  stageBadgeEl.classList.add("idle");
  stageBadgeEl.style.color = "";
  stageBadgeEl.style.borderColor = "";
  stageBadgeEl.style.background = "";
  initBoard();
  updateProgress();
  updateStepCounter();
  updatePlayBtn();
  start();
}

function updatePlayBtn(){
  playBtn.textContent = playing ? "\u23F8 Pause" : "\u25B6 Play";
  playBtn.classList.toggle("active", playing);
}

function setSpeed(s){
  speed = s;
  speedBtns.forEach(function(b){
    b.classList.toggle("active", parseFloat(b.dataset.speed) === s);
  });
  if(playing){ pause(); start(); }
}

// ── Events ──
playBtn.addEventListener("click", function(){
  playing = !playing;
  updatePlayBtn();
  if(playing){ start(); } else { pause(); }
});

restartBtn.addEventListener("click", reset);
replayBtn.addEventListener("click", reset);

speedBtns.forEach(function(btn){
  btn.addEventListener("click", function(){
    setSpeed(parseFloat(btn.dataset.speed));
  });
});

// Keyboard shortcuts
document.addEventListener("keydown", function(e){
  if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  switch(e.key){
    case " ":
      e.preventDefault();
      playing = !playing;
      updatePlayBtn();
      if(playing){ start(); } else { pause(); }
      break;
    case "r": case "R":
      reset();
      break;
    case "1":
      setSpeed(1);
      break;
    case "2":
      setSpeed(2);
      break;
    case "4":
      setSpeed(4);
      break;
  }
});

// ── Mobile tabs ──
(function(){
  var tabs = document.getElementById("mobile-tabs");
  if (!tabs) return;
  var termPanel = document.getElementById("terminal-panel");
  var rightPanels = document.getElementById("right-panels");
  var artifactPanel = document.getElementById("artifact-panel");
  var boardPanel = document.getElementById("board-panel");
  var btns = tabs.querySelectorAll("button");

  function switchTab(tab) {
    btns.forEach(function(b){ b.classList.toggle("active", b.dataset.tab === tab); });
    if (tab === "terminal") {
      termPanel.classList.remove("mobile-hidden");
      rightPanels.classList.add("mobile-hidden");
    } else if (tab === "artifacts") {
      termPanel.classList.add("mobile-hidden");
      rightPanels.classList.remove("mobile-hidden");
      artifactPanel.style.display = "";
      boardPanel.style.display = "none";
    } else if (tab === "board") {
      termPanel.classList.add("mobile-hidden");
      rightPanels.classList.remove("mobile-hidden");
      artifactPanel.style.display = "none";
      boardPanel.style.display = "";
    }
  }

  btns.forEach(function(btn){
    btn.addEventListener("click", function(){ switchTab(btn.dataset.tab); });
  });
})();

// ── Apply config and initialize ──
function applyConfigAndStart(){
  if(window.HAIKU_DEMO_CONFIG){
    var cfg = window.HAIKU_DEMO_CONFIG;
    if(cfg.stages) STAGES = cfg.stages;
    if(cfg.steps) steps = cfg.steps;
    if(cfg.completionText) completionTextEl.textContent = cfg.completionText;
    if(cfg.title){
      // Capitalize studio name for title: "data-pipeline" -> "Data Pipeline Studio"
      var displayTitle = cfg.title.replace(/-/g, " ").replace(/\b\w/g, function(c){ return c.toUpperCase(); });
      document.title = "H\u00B7AI\u00B7K\u00B7U in Action \u2014 " + displayTitle + " Studio";
    }
  }
  initBoard();
  updateProgress();
  updateStepCounter();
  start();
}

// ── Dynamic studio loading ──
(function(){
  var params = new URLSearchParams(window.location.search);
  var studio = params.get("studio");
  if(studio && studio !== "software"){
    var script = document.createElement("script");
    script.src = "demos/" + studio + ".js";
    script.onload = function(){ applyConfigAndStart(); };
    script.onerror = function(){
      console.warn("Could not load demo config for studio: " + studio + ". Using default.");
      applyConfigAndStart();
    };
    document.head.appendChild(script);
  } else {
    applyConfigAndStart();
  }
})();
</script>
